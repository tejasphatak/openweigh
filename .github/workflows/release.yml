name: Release

# Build signed release APKs and publish a GitHub Release when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
# Manual runs are also allowed via the Actions tab (workflow_dispatch).
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    name: Build & publish release APKs
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" > /dev/null

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      # Configure real release signing from repository secrets, when present. Define these in
      # Settings → Secrets and variables → Actions:
      #   KEYSTORE_BASE64  (base64 of your .jks: `base64 -w0 release.jks`)
      #   KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
      # If absent, the build falls back to the debug key (runnable, but not Play-uploadable).
      # Secrets can't be referenced in step `if:` conditions, so guard in shell instead.
      - name: Configure release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            {
              echo "storeFile=$RUNNER_TEMP/release.jks"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } > keystore.properties
            echo "Release signing configured from secrets."
          else
            echo "No KEYSTORE_BASE64 secret; release will use the debug-key fallback."
          fi

      - name: Assemble release (both flavors)
        env:
          GOOGLE_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_SERVER_CLIENT_ID }}
        run: ./gradlew assembleRelease --stacktrace -PgoogleServerClientId="$GOOGLE_SERVER_CLIENT_ID"

      - name: Collect APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/play/release/app-play-release.apk dist/openweigh-play-${{ github.ref_name }}.apk
          cp app/build/outputs/apk/foss/release/app-foss-release.apk dist/openweigh-foss-${{ github.ref_name }}.apk
          ls -l dist

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release create "${{ github.ref_name }}" dist/*.apk --title "${{ github.ref_name }}" --generate-notes

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: dist/*.apk
          if-no-files-found: error
