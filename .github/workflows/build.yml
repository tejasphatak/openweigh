name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & lint (play + foss)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" > /dev/null

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug (both flavors)
        run: ./gradlew assembleDebug --stacktrace

      - name: Unit tests
        run: ./gradlew testPlayDebugUnitTest testFossDebugUnitTest --stacktrace

      - name: Android Lint (play debug)
        # Reported but non-blocking: don't fail the pipeline on lint warnings while the app is young.
        continue-on-error: true
        run: ./gradlew lintPlayDebug --stacktrace

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: app/build/outputs/apk/*/debug/*.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          if-no-files-found: ignore
